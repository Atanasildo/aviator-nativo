services:
  - type: web
    name: nexus-aviator-collector
    env: node
    plan: free
    rootDir: collector
    nodeVersion: 18.20.4
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node collector.js
    envVars:
      - key: NODE_VERSION
        value: 18.20.4
      - key: EB_PHONE
        sync: false
      - key: EB_PASSWORD
        sync: false
      - key: SUPA_URL
        value: https://oulidkbxjfrddluoqsif.supabase.co
      - key: SUPA_KEY
        sync: false
