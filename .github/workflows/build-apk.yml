name: Build SKYBOT APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Instalar Gradle e gerar wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Assinar APK com Keystore
        run: |
          # Restaurar keystore a partir do secret
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > skybot.keystore

          # Localizar ferramentas Android
          ANDROID_BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -1)
          APKSIGNER="$ANDROID_HOME/build-tools/$ANDROID_BUILD_TOOLS/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/$ANDROID_BUILD_TOOLS/zipalign"

          # Localizar o APK compilado
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -1)
          ALIGNED_APK="app/build/outputs/apk/debug/skybot-aligned.apk"
          SIGNED_APK="app/build/outputs/apk/debug/skybot-signed.apk"

          # 1. Alinhar primeiro
          $ZIPALIGN -v 4 "$APK_PATH" "$ALIGNED_APK"

          # 2. Assinar com apksigner
          $APKSIGNER sign \
            --ks skybot.keystore \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          # 3. Verificar assinatura
          $APKSIGNER verify "$SIGNED_APK"

          echo "✅ APK assinado e verificado: $SIGNED_APK"

      - name: Obter versão do MainActivity.kt
        id: versao
        run: |
          VERSAO=$(grep 'VERSAO_ATUAL' app/src/main/java/ao/elephantbet/aviatorbot/MainActivity.kt \
            | grep -oP '"\K[^"]+(?=")' | head -1)
          if [ -z "$VERSAO" ]; then
            VERSAO=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "versao=$VERSAO" >> $GITHUB_OUTPUT
          echo "Versão detectada: $VERSAO"

      - name: Localizar APK gerado
        id: apk
        run: |
          APK_PATH="app/build/outputs/apk/debug/skybot-signed.apk"
          APK_NAME="SKYBOT-v${{ steps.versao.outputs.versao }}.apk"
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "APK encontrado: $APK_PATH"

      - name: Upload APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: SKYBOT-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Apagar release anterior (se existir)
        continue-on-error: true
        run: |
          gh release delete "latest-build" --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Criar Release com APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "SKYBOT v${{ steps.versao.outputs.versao }} (build automatico)"
          body: |
            Build automatico gerado pelo GitHub Actions.
            Versao: ${{ steps.versao.outputs.versao }}
            Commit: ${{ github.event.head_commit.message }}
            **Como instalar:**
            1. Descarrega o ficheiro `${{ steps.apk.outputs.name }}`
            2. Abre no telemóvel e instala
          files: ${{ steps.apk.outputs.path }}
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notificar Supabase (activar aviso de actualização)
        env:
          SUPA_URL: ${{ secrets.SUPA_URL }}
          SUPA_KEY: ${{ secrets.SUPA_KEY }}
        run: |
          VERSAO="${{ steps.versao.outputs.versao }}"
          APK_NAME="${{ steps.apk.outputs.name }}"
          APK_URL="https://github.com/Atanasildo/aviator-nativo/releases/download/latest-build/${APK_NAME}"
          NOTAS="${{ github.event.head_commit.message }}"

          # Limpar versões antigas
          curl -s -X DELETE \
            "${SUPA_URL}/rest/v1/versao?id=gte.0" \
            -H "apikey: ${SUPA_KEY}" \
            -H "Authorization: Bearer ${SUPA_KEY}"

          # Inserir nova versão
          curl -s -X POST \
            "${SUPA_URL}/rest/v1/versao" \
            -H "apikey: ${SUPA_KEY}" \
            -H "Authorization: Bearer ${SUPA_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"versao\":\"${VERSAO}\",\"url_apk\":\"${APK_URL}\",\"notas\":\"${NOTAS}\"}"

          echo "✅ Supabase actualizado → versão ${VERSAO}"
          echo "✅ APK URL: ${APK_URL}"
