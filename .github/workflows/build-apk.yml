name: Build Aviator Bot APK Nativo
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Instalar Gradle e gerar wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Compilar APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AviatorBot-Nativo-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Obter versão do MainActivity.kt
        id: versao
        run: |
          # Lê VERSAO_ATUAL do código — é a fonte da verdade
          VERSAO=$(grep 'VERSAO_ATUAL' app/src/main/java/ao/elephantbet/aviatorbot/MainActivity.kt \
            | grep -oP '"\K[^"]+(?=")' | head -1)
          # Fallback para build.gradle se não encontrar
          if [ -z "$VERSAO" ]; then
            VERSAO=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "versao=$VERSAO" >> $GITHUB_OUTPUT
          echo "Versão detectada: $VERSAO"

      - name: Apagar release anterior (se existir)
        continue-on-error: true
        run: |
          gh release delete "latest-build" --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Criar Release com APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "AviatorBot v${{ steps.versao.outputs.versao }} (build automatico)"
          body: |
            Build automatico gerado pelo GitHub Actions.
            Versao: ${{ steps.versao.outputs.versao }}
            Commit: ${{ github.event.head_commit.message }}

            **Como instalar:**
            1. Descarrega o ficheiro `app-debug.apk`
            2. Abre no telemóvel e instala
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── NOVO: Notificar Supabase → bot avisa utilizadores ─────────
      - name: Notificar Supabase (activar aviso de actualização)
        env:
          SUPA_URL: ${{ secrets.SUPA_URL }}
          SUPA_KEY: ${{ secrets.SUPA_KEY }}
        run: |
          VERSAO="${{ steps.versao.outputs.versao }}"
          APK_URL="https://github.com/Atanasildo/aviator-nativo/releases/download/latest-build/app-debug.apk"
          NOTAS="${{ github.event.head_commit.message }}"

          # Limpar versões antigas
          curl -s -X DELETE \
            "${SUPA_URL}/rest/v1/versao?id=gte.0" \
            -H "apikey: ${SUPA_KEY}" \
            -H "Authorization: Bearer ${SUPA_KEY}"

          # Inserir nova versão — o bot lê isto ao abrir
          curl -s -X POST \
            "${SUPA_URL}/rest/v1/versao" \
            -H "apikey: ${SUPA_KEY}" \
            -H "Authorization: Bearer ${SUPA_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"versao\":\"${VERSAO}\",\"url_apk\":\"${APK_URL}\",\"notas\":\"${NOTAS}\"}"

          echo "✅ Supabase actualizado → versão ${VERSAO}"
          echo "✅ APK URL: ${APK_URL}"
