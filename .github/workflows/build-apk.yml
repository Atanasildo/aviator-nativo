name: Build ALTUS APK
on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/src/main/java/**'
      - 'app/src/main/AndroidManifest.xml'
      - 'app/build.gradle'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Instalar Gradle e gerar wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew

      - name: Restaurar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/altus.keystore
          echo "✅ Keystore restaurada"

      - name: Compilar e Assinar APK (Release)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/altus.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Obter versão e localizar APK
        id: apk
        run: |
          VERSAO=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          APK_NAME="ALTUS-v${VERSAO}.apk"
          # Renomear APK para nome previsível
          cp "$APK_PATH" "/tmp/${APK_NAME}"
          echo "versao=$VERSAO" >> $GITHUB_OUTPUT
          echo "path=/tmp/${APK_NAME}" >> $GITHUB_OUTPUT
          echo "name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "✅ APK: $APK_PATH → /tmp/${APK_NAME}"

      - name: Upload APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ALTUS-APK
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Publicar Release com gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSAO="${{ steps.apk.outputs.versao }}"
          APK_PATH="${{ steps.apk.outputs.path }}"
          APK_NAME="${{ steps.apk.outputs.name }}"

          # Apagar release e tag anteriores
          gh release delete "latest-build" --yes --cleanup-tag 2>/dev/null || true
          sleep 3

          # Criar release novo com o APK usando gh CLI (mais fiável que softprops)
          gh release create "latest-build" \
            "$APK_PATH" \
            --title "ALTUS v${VERSAO}" \
            --notes "Versao: ${VERSAO}
          Commit: ${{ github.event.head_commit.message }}
          ✅ APK assinado — não bloqueado pelo Play Protect" \
            --latest

          echo "✅ Release criado: ALTUS v${VERSAO}"

      - name: Notificar Supabase (UPSERT seguro)
        continue-on-error: true
        env:
          SUPA_URL: ${{ secrets.SUPA_URL }}
          SUPA_KEY: ${{ secrets.SUPA_KEY }}
          NOTAS_RAW: ${{ github.event.head_commit.message }}
        run: |
          VERSAO="${{ steps.apk.outputs.versao }}"
          APK_NAME="${{ steps.apk.outputs.name }}"
          APK_URL="https://github.com/Atanasildo/aviator-nativo/releases/download/latest-build/${APK_NAME}"

          # Construir o JSON com jq para escapar correctamente aspas e quebras de
          # linha da mensagem do commit — evita falhas silenciosas com commits
          # multi-linha (o problema que fez o link do 'altus' desaparecer)
          PAYLOAD=$(jq -n \
            --arg versao "$VERSAO" \
            --arg url_apk "$APK_URL" \
            --arg notas "$NOTAS_RAW" \
            --arg bot "altus" \
            '{versao:$versao, url_apk:$url_apk, notas:$notas, bot:$bot}')

          # UPSERT real: on_conflict=bot usa a constraint unique da coluna 'bot'
          HTTP_CODE=$(curl -s -o /tmp/supa_resp.txt -w "%{http_code}" -X POST \
            "${SUPA_URL}/rest/v1/versao?on_conflict=bot" \
            -H "apikey: ${SUPA_KEY}" \
            -H "Authorization: Bearer ${SUPA_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=representation" \
            -d "$PAYLOAD")

          echo "Supabase UPSERT HTTP: $HTTP_CODE"
          cat /tmp/supa_resp.txt
          echo ""

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "❌ Falha ao notificar Supabase (HTTP $HTTP_CODE) — o link de actualizacao NAO foi actualizado!"
            exit 0
          fi

          echo "✅ Supabase → versão ${VERSAO} | url: ${APK_URL}"
